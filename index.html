<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Surface Chart</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-61Z8R0850T"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-61Z8R0850T');
</script>

<link rel="stylesheet" href="style.css">

<!-- D3.js v7 -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

<!-- Three.js import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<!-- 1. Supabase クライアント -->
<script src="https://auth.dataviz.jp/lib/supabase.js"></script>

<!-- 2. 共通ヘッダー + 認証ロジック -->
<script src="https://auth.dataviz.jp/lib/dataviz-auth-client.js"></script>

<!-- 3. ツールヘッダー -->
<script src="https://auth.dataviz.jp/lib/dataviz-tool-header.js" defer></script>
</head>
<body>

<dataviz-tool-header></dataviz-tool-header>

<!-- ==================== HTML STRUCTURE ==================== -->
<div id="app">

  <div id="controls">
    <!-- Data controls -->
    <select id="sample-select">
      <optgroup id="mof-optgroup" label="">
        <option value="mof-recent5" data-i18n="recent5"></option>
        <option value="mof-recent10" data-i18n="recent10"></option>
        <option value="mof-2020s" data-i18n="decade2020"></option>
        <option value="mof-2010s" data-i18n="decade2010"></option>
        <option value="mof-2000s" data-i18n="decade2000"></option>
        <option value="mof-1990s" data-i18n="decade1990"></option>
        <option value="mof-1980s" data-i18n="decade1980"></option>
        <option value="mof-all" data-i18n="allPeriod"></option>
      </optgroup>
      <option value="us" data-i18n="usTreasury"></option>
      <option value="births" data-i18n="numberOfBirths"></option>
    </select>
    <button id="csv-btn" data-i18n="loadCsv"></button>
    <input type="file" id="csv-input" accept=".csv" style="display:none">

    <div class="separator"></div>

    <!-- Color scheme -->
    <select id="color-select">
      <optgroup id="seq-optgroup" label="">
        <option value="YlOrRd" selected>YlOrRd</option>
        <option value="YlGnBu">YlGnBu</option>
        <option value="Viridis">Viridis</option>
        <option value="Inferno">Inferno</option>
        <option value="Plasma">Plasma</option>
        <option value="Cividis">Cividis</option>
        <option value="Turbo">Turbo</option>
        <option value="Blues">Blues</option>
        <option value="Greens">Greens</option>
        <option value="Oranges">Oranges</option>
        <option value="Reds">Reds</option>
        <option value="Purples">Purples</option>
      </optgroup>
      <optgroup id="div-optgroup" label="">
        <option value="RdBu">RdBu</option>
        <option value="RdYlBu">RdYlBu</option>
        <option value="RdYlGn">RdYlGn</option>
        <option value="Spectral">Spectral</option>
        <option value="BrBG">BrBG</option>
        <option value="PRGn">PRGn</option>
        <option value="PiYG">PiYG</option>
        <option value="PuOr">PuOr</option>
        <option value="RdGy">RdGy</option>
      </optgroup>
    </select>
    <label id="zero-center-label" style="display:none; font-size:0.8rem; cursor:pointer;">
      <input type="checkbox" id="zero-center"> <span data-i18n="zeroBasis"></span>
    </label>

    <div class="separator"></div>

    <!-- Label orientation -->
    <select id="label-orient">
      <option value="horizontal" data-i18n="labelHorizontal"></option>
      <option value="vertical" data-i18n="labelVertical"></option>
    </select>

    <div class="separator"></div>

    <!-- Camera presets -->
    <button class="view-btn active" data-view="overview" data-i18n="viewOverview"></button>
    <button class="view-btn" data-view="front" data-i18n="viewFront"></button>
    <button class="view-btn" data-view="top" data-i18n="viewTop"></button>
    <button class="view-btn" data-view="side" data-i18n="viewSide"></button>

    <div class="separator"></div>

    <span class="controls-hint" data-i18n="shareHint"></span>
  </div>

  <div id="chart-container">
    <div id="drop-overlay" data-i18n="dropCsv"></div>
  </div>

  <div id="legend">
    <span class="legend-label" id="legend-min"></span>
    <canvas id="legend-canvas" width="250" height="16"></canvas>
    <span class="legend-label" id="legend-max"></span>
    <span style="margin-left:8px" data-i18n="axisValue"></span>
  </div>

  <div id="data-info"></div>

  <div class="share-section">
    <button id="share-btn" data-i18n="shareChart"></button>
  </div>

  <div class="site-links">
    <a href="https://www.dataviz.jp/3d-surface-chart/">3D Surface Chart</a>
    <span>|</span>
    <a href="https://www.dataviz.jp/">データの道具箱</a>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
