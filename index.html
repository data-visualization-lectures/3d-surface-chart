<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Surface Chart</title>

<link rel="stylesheet" href="style.css">

<!-- D3.js v7 -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

<!-- Three.js import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- ==================== HTML STRUCTURE ==================== -->
<div id="app">
  <h1>3D Surface Chart</h1>

  <div id="controls">
    <!-- Data controls -->
    <select id="sample-select">
      <optgroup id="mof-optgroup" label="">
        <option value="mof-recent5" data-i18n="recent5"></option>
        <option value="mof-recent10" data-i18n="recent10"></option>
        <option value="mof-2020s" data-i18n="decade2020"></option>
        <option value="mof-2010s" data-i18n="decade2010"></option>
        <option value="mof-2000s" data-i18n="decade2000"></option>
        <option value="mof-1990s" data-i18n="decade1990"></option>
        <option value="mof-1980s" data-i18n="decade1980"></option>
        <option value="mof-all" data-i18n="allPeriod"></option>
      </optgroup>
      <option value="us">US Treasury (2019-2024)</option>
      <option value="random">Random Demo</option>
    </select>
    <button id="csv-btn" data-i18n="loadCsv"></button>
    <input type="file" id="csv-input" accept=".csv" style="display:none">
    <span class="help-tip"><span data-i18n="csvFormatHelp"></span><span class="help-tooltip" data-i18n="csvTooltip"></span></span>

    <div class="separator"></div>

    <!-- Color scheme -->
    <select id="color-select">
      <optgroup id="seq-optgroup" label="">
        <option value="YlOrRd" selected>YlOrRd</option>
        <option value="YlGnBu">YlGnBu</option>
        <option value="Viridis">Viridis</option>
        <option value="Inferno">Inferno</option>
        <option value="Plasma">Plasma</option>
        <option value="Cividis">Cividis</option>
        <option value="Turbo">Turbo</option>
        <option value="Blues">Blues</option>
        <option value="Greens">Greens</option>
        <option value="Oranges">Oranges</option>
        <option value="Reds">Reds</option>
        <option value="Purples">Purples</option>
      </optgroup>
      <optgroup id="div-optgroup" label="">
        <option value="RdBu">RdBu</option>
        <option value="RdYlBu">RdYlBu</option>
        <option value="RdYlGn">RdYlGn</option>
        <option value="Spectral">Spectral</option>
        <option value="BrBG">BrBG</option>
        <option value="PRGn">PRGn</option>
        <option value="PiYG">PiYG</option>
        <option value="PuOr">PuOr</option>
        <option value="RdGy">RdGy</option>
      </optgroup>
    </select>
    <label id="zero-center-label" style="display:none; font-size:0.8rem; cursor:pointer;">
      <input type="checkbox" id="zero-center"> <span data-i18n="zeroBasis"></span>
    </label>

    <div class="separator"></div>

    <!-- Camera presets -->
    <button class="view-btn active" data-view="overview">Overview</button>
    <button class="view-btn" data-view="front">Front</button>
    <button class="view-btn" data-view="top">Top</button>
    <button class="view-btn" data-view="side">Side</button>
  </div>

  <div id="chart-container">
    <div id="drop-overlay" data-i18n="dropCsv"></div>
  </div>

  <div id="legend">
    <span class="legend-label" id="legend-min"></span>
    <canvas id="legend-canvas" width="250" height="16"></canvas>
    <span class="legend-label" id="legend-max"></span>
    <span style="margin-left:8px" data-i18n="axisValue"></span>
  </div>

  <div id="data-info"></div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
