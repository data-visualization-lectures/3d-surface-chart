<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Surface Chart</title>

<link rel="stylesheet" href="style.css">

<!-- D3.js v7 -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

<!-- Three.js import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- ==================== HTML STRUCTURE ==================== -->
<div id="app">
  <h1>3D Surface Chart</h1>

  <div id="controls">
    <!-- Data controls -->
    <select id="sample-select">
      <optgroup label="財務省 過去の金利情報 (1974-)">
        <option value="mof-recent5">直近5年</option>
        <option value="mof-recent10">直近10年</option>
        <option value="mof-2020s">2020年代</option>
        <option value="mof-2010s">2010年代</option>
        <option value="mof-2000s">2000年代</option>
        <option value="mof-1990s">1990年代</option>
        <option value="mof-1980s">1980年代</option>
        <option value="mof-all">全期間 (1974-)</option>
      </optgroup>
      <option value="us">US Treasury (2019-2024)</option>
      <option value="jp">Japan JGB (2019-2024)</option>
      <option value="random">Random Demo</option>
    </select>
    <button id="csv-btn">Load CSV</button>
    <input type="file" id="csv-input" accept=".csv" style="display:none">
    <span class="help-tip">CSV format ?<span class="help-tooltip">CSV format:
date,1M,3M,6M,1Y,2Y,5Y,10Y,30Y
2024-01-02,5.53,5.47,5.36,5.01,4.40,3.98,3.95,4.10
...
First column: date (YYYY-MM-DD)
Other columns: maturity labels with yield values
Maturity names: use M for months, Y for years</span></span>

    <div class="separator"></div>

    <!-- Color scheme -->
    <select id="color-select">
      <optgroup label="連続的 (Sequential)">
        <option value="YlOrRd" selected>YlOrRd</option>
        <option value="YlGnBu">YlGnBu</option>
        <option value="Viridis">Viridis</option>
        <option value="Inferno">Inferno</option>
        <option value="Plasma">Plasma</option>
        <option value="Cividis">Cividis</option>
        <option value="Turbo">Turbo</option>
        <option value="Blues">Blues</option>
        <option value="Greens">Greens</option>
        <option value="Oranges">Oranges</option>
        <option value="Reds">Reds</option>
        <option value="Purples">Purples</option>
      </optgroup>
      <optgroup label="分岐的 (Diverging)">
        <option value="RdBu">RdBu</option>
        <option value="RdYlBu">RdYlBu</option>
        <option value="RdYlGn">RdYlGn</option>
        <option value="Spectral">Spectral</option>
        <option value="BrBG">BrBG</option>
        <option value="PRGn">PRGn</option>
        <option value="PiYG">PiYG</option>
        <option value="PuOr">PuOr</option>
        <option value="RdGy">RdGy</option>
      </optgroup>
    </select>
    <label id="zero-center-label" style="display:none; font-size:0.8rem; cursor:pointer;">
      <input type="checkbox" id="zero-center"> 0基準
    </label>

    <div class="separator"></div>

    <!-- Camera presets -->
    <button class="view-btn active" data-view="overview">Overview</button>
    <button class="view-btn" data-view="front">Front</button>
    <button class="view-btn" data-view="top">Top</button>
    <button class="view-btn" data-view="side">Side</button>
  </div>

  <div id="chart-container">
    <div id="drop-overlay">Drop CSV file here</div>
  </div>

  <div id="legend">
    <span class="legend-label" id="legend-min"></span>
    <canvas id="legend-canvas" width="250" height="16"></canvas>
    <span class="legend-label" id="legend-max"></span>
    <span style="margin-left:8px">Yield (%)</span>
  </div>

  <div id="data-info"></div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
