<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===== I18N =====
const LANG = navigator.language.startsWith('ja') ? 'ja' : 'en';
const I18N = {
  loading:     { ja: '読み込み中...', en: 'Loading...' },
  errorNotFound: { ja: 'シェアデータが見つかりません', en: 'Shared chart not found' },
  errorLoad:   { ja: '読み込みに失敗しました', en: 'Failed to load chart' },
  axisValue:   { ja: '値', en: 'Value' },
  axisCategory:{ ja: 'カテゴリ', en: 'Category' },
  axisDate:    { ja: '日付', en: 'Date' },
  ctaText:     { ja: '自分も 3D Surface Chart を作る', en: 'Create your own 3D Surface Chart' },
  sequential:  { ja: '連続的 (Sequential)', en: 'Sequential' },
  diverging:   { ja: '分岐的 (Diverging)', en: 'Diverging' },
  zeroBasis:   { ja: '0基準', en: 'Zero-centered' },
  labelHorizontal: { ja: '横書き', en: 'Horizontal' },
  labelVertical:   { ja: '縦書き', en: 'Vertical' },
  viewOverview:{ ja: '全体', en: 'Overview' },
  viewFront:   { ja: '正面', en: 'Front' },
  viewTop:     { ja: '上面', en: 'Top' },
  viewSide:    { ja: '側面', en: 'Side' },
  timeout:     { ja: '読み込みがタイムアウトしました。ページを再読み込みしてください。', en: 'Loading timed out. Please reload the page.' },
};
function t(key) { return I18N[key][LANG]; }

const IS_EMBED = new URLSearchParams(location.search).get('embed') === '1';

if (IS_EMBED) {
  document.documentElement.classList.add('dvz-embed');

  const postHeight = () => {
    window.parent.postMessage(
      { type: 'dvz-resize', height: document.documentElement.scrollHeight },
      '*'
    );
  };
  new ResizeObserver(postHeight).observe(document.body);
  window.addEventListener('load', postHeight);

  const retargetLinks = () => {
    document.querySelectorAll('a[href]:not([target="_blank"])').forEach(a => {
      if (!a.href.startsWith('javascript:')) {
        a.target = '_blank';
        a.rel = 'noopener';
      }
    });
  };
  retargetLinks();
  new MutationObserver(retargetLinks).observe(document.body, { childList: true, subtree: true });
}

// ===== CONFIG =====
const CONFIG = {
  surfaceWidth: 30, surfaceHeight: 12, surfaceDepth: 30,
  gridOpacity: 0.25, gridColor: 0x555555, bgColor: 0xffffff,
  cameraFov: 45, nanColor: new THREE.Color(0xbbbbbb),
};

const CAMERA_PRESETS = {
  overview: {
    position: [-20, 12, 40],
    target: [CONFIG.surfaceWidth / 2, CONFIG.surfaceHeight * 0.3, CONFIG.surfaceDepth / 2],
  },
  front: {
    position: [CONFIG.surfaceWidth / 2, CONFIG.surfaceHeight * 0.5, CONFIG.surfaceDepth + 30],
    target: [CONFIG.surfaceWidth / 2, CONFIG.surfaceHeight * 0.3, CONFIG.surfaceDepth / 2],
  },
  top: {
    position: [CONFIG.surfaceWidth / 2, 55, CONFIG.surfaceDepth / 2 + 0.1],
    target: [CONFIG.surfaceWidth / 2, 0, CONFIG.surfaceDepth / 2],
  },
  side: {
    position: [-25, CONFIG.surfaceHeight * 0.6, CONFIG.surfaceDepth / 2],
    target: [CONFIG.surfaceWidth / 2, CONFIG.surfaceHeight * 0.3, CONFIG.surfaceDepth / 2],
  },
};
const TRANSITION_FRAMES = 90;
let animating = false;
let animStartPos, animEndPos, animStartTarget, animEndTarget, animFrame = 0;
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// ===== STATE =====
let renderer, camera, controls, scene;
let surfaceGroup = null;
let labelElements = [];
let currentData = null;
let yieldMin = 0, yieldMax = 6;
let xScale, yScale, zScale, colorScale;
let currentColorScheme = 'YlOrRd';
let zeroCentered = false;

// NaN or null (JSON.stringify turns NaN into null)
function isMissing(v) { return v === null || v === undefined || isNaN(v); }

// ===== COLOR =====
const DIVERGING_SCHEMES = new Set([
  'RdBu','RdYlBu','RdYlGn','Spectral','BrBG','PRGn','PiYG','PuOr','RdGy'
]);
function getInterpolator(name) {
  return d3['interpolate' + name] || d3.interpolateYlOrRd;
}
function isDiverging() { return DIVERGING_SCHEMES.has(currentColorScheme); }
function buildColorScale() {
  const interp = getInterpolator(currentColorScheme);
  if (isDiverging() && zeroCentered) {
    const absMax = Math.max(Math.abs(yieldMin), Math.abs(yieldMax));
    return d3.scaleDiverging(interp).domain([absMax, 0, -absMax]);
  }
  if (isDiverging()) {
    return d3.scaleDiverging(interp).domain([yieldMax, (yieldMin + yieldMax) / 2, yieldMin]);
  }
  return d3.scaleSequential(interp).domain([yieldMin, yieldMax]);
}

function updateColors() {
  if (!currentData || !surfaceGroup) return;
  colorScale = buildColorScale();
  surfaceGroup.traverse(obj => {
    if (obj.isMesh && obj.geometry.getAttribute('color')) {
      const { maturityMonths, curves } = currentData;
      const numX = maturityMonths.length;
      const numZ = curves.length;
      const colors = obj.geometry.getAttribute('color');
      for (let iz = 0; iz < numZ; iz++) {
        for (let ix = 0; ix < numX; ix++) {
          const idx = iz * numX + ix;
          const raw = curves[iz].yields[ix];
          const c = isMissing(raw) ? CONFIG.nanColor : new THREE.Color(colorScale(raw));
          colors.setXYZ(idx, c.r, c.g, c.b);
        }
      }
      colors.needsUpdate = true;
    }
  });
  buildLegend();
}

// ===== SURFACE =====
function buildSurface(data) {
  const { maturityMonths, curves } = data;
  const numX = maturityMonths.length;
  const numZ = curves.length;
  const totalVerts = numX * numZ;
  const positions = new Float32Array(totalVerts * 3);
  const colors = new Float32Array(totalVerts * 3);
  for (let iz = 0; iz < numZ; iz++) {
    for (let ix = 0; ix < numX; ix++) {
      const idx = (iz * numX + ix) * 3;
      const yieldVal = curves[iz].yields[ix];
      const val = isMissing(yieldVal) ? 0 : yieldVal;
      positions[idx]     = xScale(maturityMonths[ix]);
      positions[idx + 1] = yScale(val);
      positions[idx + 2] = zScale(iz);
      const color = isMissing(yieldVal) ? CONFIG.nanColor : new THREE.Color(colorScale(val));
      colors[idx]     = color.r;
      colors[idx + 1] = color.g;
      colors[idx + 2] = color.b;
    }
  }
  const indices = [];
  for (let iz = 0; iz < numZ - 1; iz++) {
    for (let ix = 0; ix < numX - 1; ix++) {
      const a = iz * numX + ix;
      const b = a + 1;
      const c = a + numX;
      const d = c + 1;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  return new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.DoubleSide }));
}

function buildGridLines(data) {
  const group = new THREE.Group();
  const { maturityMonths, curves } = data;
  const numX = maturityMonths.length;
  const numZ = curves.length;
  const mat = new THREE.LineBasicMaterial({ color: CONFIG.gridColor, opacity: CONFIG.gridOpacity, transparent: true });
  for (let ix = 0; ix < numX; ix++) {
    const points = [];
    for (let iz = 0; iz < numZ; iz++) {
      const val = isMissing(curves[iz].yields[ix]) ? 0 : curves[iz].yields[ix];
      points.push(new THREE.Vector3(xScale(maturityMonths[ix]), yScale(val), zScale(iz)));
    }
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), mat));
  }
  const dateStep = Math.max(1, Math.floor(numZ / 24));
  for (let iz = 0; iz < numZ; iz += dateStep) {
    const points = [];
    for (let ix = 0; ix < numX; ix++) {
      const val = isMissing(curves[iz].yields[ix]) ? 0 : curves[iz].yields[ix];
      points.push(new THREE.Vector3(xScale(maturityMonths[ix]), yScale(val), zScale(iz)));
    }
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), mat));
  }
  {
    const iz = numZ - 1;
    const points = [];
    for (let ix = 0; ix < numX; ix++) {
      const val = isMissing(curves[iz].yields[ix]) ? 0 : curves[iz].yields[ix];
      points.push(new THREE.Vector3(xScale(maturityMonths[ix]), yScale(val), zScale(iz)));
    }
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), mat));
  }
  return group;
}

function buildBoundingBox() {
  const group = new THREE.Group();
  const W = CONFIG.surfaceWidth, H = CONFIG.surfaceHeight, D = CONFIG.surfaceDepth;
  const axisMat = new THREE.LineBasicMaterial({ color: 0x999999, opacity: 0.5, transparent: true });
  const floor = [new THREE.Vector3(0,0,0), new THREE.Vector3(W,0,0), new THREE.Vector3(W,0,D), new THREE.Vector3(0,0,D), new THREE.Vector3(0,0,0)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(floor), axisMat));
  [[0,0],[W,0],[W,D],[0,D]].forEach(([x,z]) => {
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,0,z), new THREE.Vector3(x,H,z)]), axisMat));
  });
  const top = [new THREE.Vector3(0,H,0), new THREE.Vector3(W,H,0), new THREE.Vector3(W,H,D), new THREE.Vector3(0,H,D), new THREE.Vector3(0,H,0)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(top), axisMat));
  const gridMat = new THREE.LineBasicMaterial({ color: 0xcccccc, opacity: 0.3, transparent: true });
  d3.ticks(yieldMin, yieldMax, 6).forEach(tick => {
    const y = yScale(tick);
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,y,0), new THREE.Vector3(0,y,D)]), gridMat));
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,y,0), new THREE.Vector3(W,y,0)]), gridMat));
  });
  return group;
}

// ===== LABELS =====
function makeLabel(text, isTitle = false) {
  const el = document.createElement('div');
  el.className = 'axis-label' + (isTitle ? ' title' : '');
  el.textContent = text;
  return el;
}

function createLabels(data, labelOrient) {
  const container = document.getElementById('chart-container');
  const { maturities, maturityMonths, curves } = data;
  const yTicks = d3.ticks(yieldMin, yieldMax, 6);
  yTicks.forEach(tick => {
    const el = makeLabel(`${tick}`);
    el._anchor = new THREE.Vector3(CONFIG.surfaceWidth + 1.5, yScale(tick), CONFIG.surfaceDepth + 0.5);
    container.appendChild(el); labelElements.push(el);
  });
  const yTitle = makeLabel(t('axisValue'), true);
  yTitle._anchor = new THREE.Vector3(CONFIG.surfaceWidth + 3, yScale((yieldMin + yieldMax) / 2), CONFIG.surfaceDepth + 1);
  container.appendChild(yTitle); labelElements.push(yTitle);

  maturities.forEach((m, ix) => {
    const el = makeLabel(m);
    el.classList.add('category-label');
    if (labelOrient === 'vertical') el.classList.add('vertical');
    el._anchor = new THREE.Vector3(xScale(maturityMonths[ix]), -1, CONFIG.surfaceDepth + 1.5);
    container.appendChild(el); labelElements.push(el);
  });
  const xTitle = makeLabel(t('axisCategory'), true);
  xTitle._anchor = new THREE.Vector3(CONFIG.surfaceWidth / 2, -2.5, CONFIG.surfaceDepth + 3);
  container.appendChild(xTitle); labelElements.push(xTitle);

  const firstDate = curves[0].date;
  const lastDate = curves[curves.length - 1].date;
  const spanYears = (new Date(lastDate) - new Date(firstDate)) / (365.25 * 24 * 3600 * 1000);
  if (spanYears <= 3) {
    const monthEntries = []; const seenMonths = new Set();
    curves.forEach((c, iz) => { const key = c.date.slice(0, 7); if (!seenMonths.has(key)) { seenMonths.add(key); monthEntries.push({ label: key, iz }); } });
    const step = Math.max(1, Math.ceil(monthEntries.length / 12));
    monthEntries.forEach((entry, i) => {
      if (i === 0 || i === monthEntries.length - 1 || i % step === 0) {
        const el = makeLabel(entry.label);
        el._anchor = new THREE.Vector3(-2, -1, zScale(entry.iz));
        container.appendChild(el); labelElements.push(el);
      }
    });
  } else {
    const yearEntries = []; const seenYears = new Set();
    curves.forEach((c, iz) => { const year = parseInt(c.date.slice(0, 4)); if (!seenYears.has(year)) { seenYears.add(year); yearEntries.push({ year, iz }); } });
    const tickYears = new Set(d3.ticks(yearEntries[0].year, yearEntries[yearEntries.length - 1].year, 10).map(Math.round));
    tickYears.add(yearEntries[0].year); tickYears.add(yearEntries[yearEntries.length - 1].year);
    yearEntries.forEach(entry => {
      if (tickYears.has(entry.year)) {
        const el = makeLabel(String(entry.year));
        el._anchor = new THREE.Vector3(-2, -1, zScale(entry.iz));
        container.appendChild(el); labelElements.push(el);
      }
    });
  }
  const zTitle = makeLabel(t('axisDate'), true);
  zTitle._anchor = new THREE.Vector3(-4, -2.5, CONFIG.surfaceDepth / 2);
  container.appendChild(zTitle); labelElements.push(zTitle);
}

function updateLabels() {
  const container = document.getElementById('chart-container');
  const w = container.clientWidth, h = container.clientHeight;
  labelElements.forEach(el => {
    if (!el._anchor) return;
    const pos = el._anchor.clone().project(camera);
    const x = (pos.x * 0.5 + 0.5) * w;
    const y = (-pos.y * 0.5 + 0.5) * h;
    if (pos.z > 1 || x < -50 || x > w + 50 || y < -50 || y > h + 50) {
      el.style.opacity = '0';
    } else {
      el.style.opacity = '1'; el.style.left = x + 'px'; el.style.top = y + 'px';
      el.style.transform = 'translate(-50%, -50%)';
    }
  });
}

// ===== LEGEND =====
function buildLegend() {
  const canvas = document.getElementById('legend-canvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  for (let i = 0; i < w; i++) {
    const t = i / (w - 1);
    const val = yieldMin + t * (yieldMax - yieldMin);
    ctx.fillStyle = colorScale(val);
    ctx.fillRect(i, 0, 1, h);
  }
  document.getElementById('legend-min').textContent = yieldMin.toFixed(1);
  document.getElementById('legend-max').textContent = yieldMax.toFixed(1);
}

// ===== LOAD DATA =====
function loadData(data, labelOrient) {
  currentData = data;
  const { maturityMonths, curves } = data;
  let allYields = curves.flatMap(c => c.yields).filter(v => !isMissing(v));
  yieldMin = Math.floor(Math.min(...allYields));
  yieldMax = Math.ceil(Math.max(...allYields));
  if (yieldMin === yieldMax) { yieldMin -= 1; yieldMax += 1; }

  xScale = d3.scaleLinear().domain([d3.min(maturityMonths), d3.max(maturityMonths)]).range([0, CONFIG.surfaceWidth]);
  yScale = d3.scaleLinear().domain([yieldMin, yieldMax]).range([0, CONFIG.surfaceHeight]);
  zScale = d3.scaleLinear().domain([0, curves.length - 1]).range([0, CONFIG.surfaceDepth]);
  colorScale = buildColorScale();

  if (surfaceGroup) {
    scene.remove(surfaceGroup);
    surfaceGroup.traverse(obj => { if (obj.geometry) obj.geometry.dispose(); if (obj.material) obj.material.dispose(); });
  }
  labelElements.forEach(el => el.remove());
  labelElements = [];

  surfaceGroup = new THREE.Group();
  surfaceGroup.add(buildSurface(data));
  surfaceGroup.add(buildGridLines(data));
  surfaceGroup.add(buildBoundingBox());
  scene.add(surfaceGroup);

  createLabels(data, labelOrient);
  buildLegend();
}

// ===== ANIMATION LOOP =====
function animateToPreset(name) {
  const preset = CAMERA_PRESETS[name];
  if (!preset) return;
  animStartPos = camera.position.clone();
  animEndPos = new THREE.Vector3(...preset.position);
  animStartTarget = controls.target.clone();
  animEndTarget = new THREE.Vector3(...preset.target);
  animFrame = 0;
  animating = true;
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === name);
  });
  const hideCat = name === 'side';
  document.querySelectorAll('.category-label').forEach(el => {
    el.style.display = hideCat ? 'none' : '';
  });
}

function animate() {
  requestAnimationFrame(animate);
  if (animating) {
    animFrame++;
    const t = easeInOutCubic(Math.min(animFrame / TRANSITION_FRAMES, 1));
    camera.position.lerpVectors(animStartPos, animEndPos, t);
    controls.target.lerpVectors(animStartTarget, animEndTarget, t);
    if (animFrame >= TRANSITION_FRAMES) animating = false;
  }
  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}
